name: CI

# Runs on every PR and push with NO Azure credentials, so it stays green on any clone.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync (all workspace packages, frozen — fails on lockfile drift)
        run: uv sync --all-packages --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Tests (offline)
        run: uv run pytest -q

  iac-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bicep build (validate)
        run: az bicep build --file infra/bicep/main.bicep --stdout > /dev/null

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image (no push)
        run: docker build -t deep-research:ci .
